name: CheemsFeed APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Rinomina APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/CheemsFeed_v1.0.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CheemsFeed_v1.0.0
          path: app/build/outputs/apk/release/CheemsFeed_v1.0.0.apk
          
